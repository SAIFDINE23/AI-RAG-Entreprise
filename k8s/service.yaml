# ============================================================
# Enterprise RAG Assistant — Kubernetes Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: rag-assistant
  namespace: rag-assistant
  labels:
    app.kubernetes.io/name: rag-assistant
    app.kubernetes.io/part-of: enterprise-rag-assistant
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rag-assistant
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
